<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceMesh Detection - MediaPipe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #fff;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        h1 {
            text-align: center;
            font-weight: 300;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .mixed-content-warning {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .mixed-content-warning i {
            color: #fbbf24;
            font-size: 1.2rem;
        }

        .mixed-content-warning a {
            color: #f093fb;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
        }

        .video-wrapper {
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #0d0d1a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            aspect-ratio: 16 / 9;
        }

        .video-wrapper video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .video-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .status-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.active {
            background: #4ade80;
            animation: pulse 1.5s infinite;
        }

        .dot.inactive {
            background: #f87171;
        }

        .dot.loading {
            background: #fbbf24;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .controls {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #f5a3ff, #f66a7d);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.3);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.5);
        }

        .btn-warning {
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }

        .btn-warning:hover {
            background: rgba(251, 191, 36, 0.3);
        }

        .face-count {
            font-weight: 600;
            color: #f093fb;
            font-size: 1.1rem;
        }

        .fps-display {
            font-family: 'Courier New', monospace;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 1rem;
                border-radius: 1rem;
            }

            h1 {
                font-size: 1.3rem;
            }

            .mixed-content-warning {
                font-size: 0.75rem;
                padding: 0.6rem 1rem;
                flex-wrap: wrap;
            }

            .status-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                justify-content: center;
            }

            .btn {
                padding: 0.4rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔮 FaceMesh Detection</h1>
        <p class="subtitle">MediaPipe · 468 Landmark Wajah</p>

        <!-- Peringatan Mixed Content -->
        <div class="mixed-content-warning" id="mixedWarning">
            <i class="fas fa-exclamation-triangle"></i>
            <span>
                <strong>Mixed Content:</strong> Halaman di-load melalui HTTPS, tetapi beberapa resource mungkin dimuat melalui HTTP. 
                <a href="#" onclick="allowMixedContent(); return false;">Izinkan konten campuran</a> atau 
                <a href="#" onclick="reloadWithMixed(); return false;">muat ulang dengan pengaturan khusus</a>.
            </span>
        </div>

        <div class="video-wrapper">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="overlayCanvas"></canvas>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">Memulai...</span>
            </div>
            <div class="status-item">
                <i class="fas fa-user" style="opacity:0.5;"></i>
                <span>Wajah terdeteksi: <span class="face-count" id="faceCount">0</span></span>
            </div>
            <div class="status-item fps-display">
                <span id="fpsDisplay">FPS: 0</span>
            </div>
            <div class="controls">
                <button class="btn btn-primary" id="startBtn">▶ Mulai</button>
                <button class="btn btn-danger" id="stopBtn">⏹ Berhenti</button>
                <button class="btn btn-warning" id="reloadBtn">⟳ Muat Ulang</button>
            </div>
        </div>
    </div>

    <!-- MediaPipe Dependencies - Menggunakan HTTPS -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <script>
        (function() {
            // Elemen DOM
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('overlayCanvas');
            const ctx = canvas.getContext('2d');

            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const faceCount = document.getElementById('faceCount');
            const fpsDisplay = document.getElementById('fpsDisplay');

            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const reloadBtn = document.getElementById('reloadBtn');
            const mixedWarning = document.getElementById('mixedWarning');

            // State
            let camera = null;
            let faceMesh = null;
            let isRunning = false;
            let animationId = null;
            let frameCount = 0;
            let lastFpsUpdate = performance.now();

            // Konfigurasi FaceMesh
            const faceMeshConfig = {
                maxNumFaces: 4,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5,
                selfieMode: true
            };

            // Fungsi untuk mengizinkan mixed content
            window.allowMixedContent = function() {
                // Mengirim pesan ke console untuk informasi
                console.log('Mengizinkan mixed content...');
                // Sembunyikan warning
                mixedWarning.style.display = 'none';
                // Reload FaceMesh dengan pengaturan khusus
                if (faceMesh) {
                    try {
                        faceMesh.initialize().then(() => {
                            updateStatus('ready', 'Siap (mixed content diizinkan)', 'active');
                        });
                    } catch (e) {
                        console.warn('Error reinitializing:', e);
                    }
                }
                // Tampilkan notifikasi
                showNotification('Mixed content diizinkan. Silakan mulai deteksi.');
            };

            // Fungsi untuk reload dengan meta tag
            window.reloadWithMixed = function() {
                // Tambahkan meta tag untuk mengizinkan mixed content
                const meta = document.createElement('meta');
                meta.httpEquiv = 'Content-Security-Policy';
                meta.content = "upgrade-insecure-requests";
                document.head.appendChild(meta);
                
                // Reload halaman
                window.location.reload();
            };

            // Fungsi notifikasi sederhana
            function showNotification(message) {
                const existing = document.querySelector('.toast-notification');
                if (existing) existing.remove();
                
                const toast = document.createElement('div');
                toast.className = 'toast-notification';
                toast.style.cssText = `
                    position: fixed;
                    bottom: 2rem;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(0,0,0,0.9);
                    color: #fff;
                    padding: 1rem 2rem;
                    border-radius: 1rem;
                    border: 1px solid rgba(255,255,255,0.1);
                    z-index: 1000;
                    max-width: 90%;
                    text-align: center;
                    animation: fadeInUp 0.3s ease;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            // Inisialisasi FaceMesh
            function initFaceMesh() {
                try {
                    faceMesh = new FaceMesh({
                        locateFile: (file) => {
                            // Gunakan HTTPS untuk menghindari mixed content
                            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                        }
                    });

                    faceMesh.setOptions(faceMeshConfig);

                    faceMesh.onResults(onResults);

                    // Event untuk loading status
                    faceMesh.initialize().then(() => {
                        updateStatus('ready', 'Siap', 'active');
                        mixedWarning.style.display = 'none';
                    }).catch((err) => {
                        console.error('FaceMesh initialization error:', err);
                        // Jika error karena mixed content, tampilkan warning
                        if (err.message && err.message.includes('mixed')) {
                            mixedWarning.style.display = 'flex';
                            updateStatus('error', 'Mixed content blocking FaceMesh', 'inactive');
                        } else {
                            updateStatus('error', 'Gagal memuat FaceMesh', 'inactive');
                        }
                    });
                } catch (err) {
                    console.error('Error creating FaceMesh:', err);
                    updateStatus('error', 'Gagal membuat FaceMesh', 'inactive');
                    mixedWarning.style.display = 'flex';
                }
            }

            // Callback hasil deteksi
            function onResults(results) {
                // Bersihkan canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Gambar video di canvas sebagai background (mirror)
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
                ctx.restore();

                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    // Update jumlah wajah
                    faceCount.textContent = results.multiFaceLandmarks.length;

                    // Gambar setiap wajah
                    for (const landmarks of results.multiFaceLandmarks) {
                        drawFaceMesh(landmarks);
                    }

                    updateStatus('detecting', `Deteksi ${results.multiFaceLandmarks.length} wajah`, 'active');
                } else {
                    faceCount.textContent = '0';
                    updateStatus('idle', 'Tidak ada wajah terdeteksi', 'loading');
                }

                // Update FPS
                frameCount++;
                const now = performance.now();
                if (now - lastFpsUpdate >= 1000) {
                    const fps = Math.round(frameCount * 1000 / (now - lastFpsUpdate));
                    fpsDisplay.textContent = `FPS: ${fps}`;
                    frameCount = 0;
                    lastFpsUpdate = now;
                }
            }

            // Fungsi menggambar FaceMesh
            function drawFaceMesh(landmarks) {
                const baseColor = [245, 87, 108];

                // Koneksi utama FaceMesh
                const connections = [
                    [468, 469], [469, 470], [470, 471], [471, 468],
                    [472, 473], [473, 474], [474, 475], [475, 472],
                    [61, 146], [146, 91], [91, 181], [181, 84], [84, 17],
                    [17, 314], [314, 405], [405, 321], [321, 375], [375, 291],
                    [78, 95], [95, 88], [88, 178], [178, 87], [87, 14],
                    [14, 317], [317, 402], [402, 318], [318, 324], [324, 308],
                    [33, 7], [7, 163], [163, 144], [144, 145], [145, 153],
                    [153, 154], [154, 155], [155, 133], [33, 133],
                    [263, 249], [249, 390], [390, 373], [373, 374], [374, 380],
                    [380, 381], [381, 382], [382, 362], [263, 362],
                    [46, 53], [53, 52], [52, 65], [65, 55],
                    [276, 283], [283, 282], [282, 295], [295, 285],
                    [1, 2], [2, 98], [98, 327], [1, 19], [19, 94], [94, 327],
                    [10, 338], [338, 297], [297, 332], [332, 284], [284, 251],
                    [251, 389], [389, 356], [356, 454], [454, 323], [323, 361],
                    [361, 288], [288, 397], [397, 365], [365, 379], [379, 378],
                    [378, 400], [400, 377], [377, 152], [152, 148], [148, 176],
                    [176, 149], [149, 150], [150, 136], [136, 172], [172, 58],
                    [58, 132], [132, 93], [93, 234], [234, 127], [127, 162],
                    [162, 21], [21, 54], [54, 103], [103, 67], [67, 109],
                    [109, 10]
                ];

                // Gambar koneksi
                for (const [idx1, idx2] of connections) {
                    if (idx1 < landmarks.length && idx2 < landmarks.length) {
                        const p1 = landmarks[idx1];
                        const p2 = landmarks[idx2];
                        const x1 = p1.x * canvas.width;
                        const y1 = p1.y * canvas.height;
                        const x2 = p2.x * canvas.width;
                        const y2 = p2.y * canvas.height;

                        const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
                        const alpha = 0.6 + 0.3 * (1 - Math.abs(p1.y - 0.5) * 2);
                        gradient.addColorStop(0, `rgba(${baseColor[0]}, ${baseColor[1] + 30}, ${baseColor[2] + 50}, ${alpha})`);
                        gradient.addColorStop(1, `rgba(${baseColor[0] + 40}, ${baseColor[1]}, ${baseColor[2] + 20}, ${alpha})`);

                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                    }
                }

                // Gambar titik landmark
                for (let i = 0; i < landmarks.length; i++) {
                    const p = landmarks[i];
                    const x = p.x * canvas.width;
                    const y = p.y * canvas.height;
                    const z = p.z || 0;

                    const size = 2 + (1 - Math.abs(z)) * 2;

                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
                    gradient.addColorStop(0, `rgba(${baseColor[0] + 30}, ${baseColor[1] + 50}, 255, 0.9)`);
                    gradient.addColorStop(0.5, `rgba(${baseColor[0]}, ${baseColor[1]}, ${baseColor[2] + 80}, 0.5)`);
                    gradient.addColorStop(1, `rgba(${baseColor[0]}, ${baseColor[1]}, ${baseColor[2] + 100}, 0)`);

                    ctx.beginPath();
                    ctx.arc(x, y, size * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, 0.85)`;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(x, y, size + 1, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(${baseColor[0] + 20}, ${baseColor[1] + 40}, 255, 0.3)`;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }

            // Update status UI
            function updateStatus(state, text, dotClass) {
                statusText.textContent = text;
                statusDot.className = 'dot';
                if (dotClass) {
                    statusDot.classList.add(dotClass);
                }
            }

            // Inisialisasi kamera
            async function startCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            facingMode: 'user'
                        }
                    });
                    video.srcObject = stream;
                    await video.play();

                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;

                    updateStatus('starting', 'Kamera aktif, memuat FaceMesh...', 'loading');

                    if (!faceMesh) {
                        initFaceMesh();
                    }

                    isRunning = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;

                    detectLoop();

                    updateStatus('running', 'FaceMesh berjalan', 'active');

                } catch (err) {
                    console.error('Error accessing camera:', err);
                    updateStatus('error', 'Gagal akses kamera: ' + err.message, 'inactive');
                    alert('Tidak dapat mengakses kamera. Pastikan izin kamera diberikan.');
                }
            }

            // Loop deteksi
            function detectLoop() {
                if (!isRunning) return;

                if (video.readyState >= 2 && faceMesh) {
                    try {
                        faceMesh.send({ image: video });
                    } catch (err) {
                        console.error('Detection error:', err);
                    }
                }

                animationId = requestAnimationFrame(detectLoop);
            }

            // Hentikan deteksi
            function stopCamera() {
                isRunning = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;

                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }

                if (video.srcObject) {
                    const tracks = video.srcObject.getTracks();
                    tracks.forEach(track => track.stop());
                    video.srcObject = null;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                updateStatus('stopped', 'Dihentikan', 'inactive');
                faceCount.textContent = '0';
                fpsDisplay.textContent = 'FPS: 0';
            }

            // Event listeners
            startBtn.addEventListener('click', startCamera);
            stopBtn.addEventListener('click', stopCamera);
            reloadBtn.addEventListener('click', () => {
                window.location.reload();
            });

            // Inisialisasi awal
            updateStatus('idle', 'Klik "Mulai" untuk memulai', 'inactive');
            stopBtn.disabled = true;

            video.addEventListener('loadedmetadata', () => {
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
            });

            window.addEventListener('beforeunload', () => {
                if (isRunning) {
                    stopCamera();
                }
            });

            // Inisialisasi FaceMesh
            initFaceMesh();

            console.log('FaceMesh Detection siap!');
            console.log('Klik "Mulai" untuk mengakses kamera dan memulai deteksi wajah.');

            // Style tambahan untuk notifikasi
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeInUp {
                    from {
                        opacity: 0;
                        transform: translateX(-50%) translateY(20px);
                    }
                    to {
                        opacity: 1;
                        transform: translateX(-50%) translateY(0);
                    }
                }
            `;
            document.head.appendChild(style);

        })();
    </script>

    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
